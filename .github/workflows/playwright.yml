name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      pages: write
      id-token: write
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm run test:ui -- --reporter=html
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-ui

      - name: Run API tests
        run: npm run test:api -- --reporter=html
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-api

      - name: Upload UI report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report-ui/
          retention-days: 30

      - name: Upload API report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report-api/
          retention-days: 30

      - name: Prepare Pages report and history
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_CONCLUSION: ${{ job.status }}
        run: |
          set -euo pipefail

          mkdir -p playwright-report

          # Build a Pages-ready root with links to both HTML reports.
          if [ -d "playwright-report-ui" ]; then
            mkdir -p playwright-report/ui
            cp -R playwright-report-ui/. playwright-report/ui/
          fi

          if [ -d "playwright-report-api" ]; then
            mkdir -p playwright-report/api
            cp -R playwright-report-api/. playwright-report/api/
          fi

          cat > playwright-report/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Playwright Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; }
              h1 { margin-bottom: 1rem; }
              ul { line-height: 1.8; }
            </style>
          </head>
          <body>
            <h1>Playwright Reports</h1>
            <ul>
              <li><a href="./ui/index.html">UI Test Report</a></li>
              <li><a href="./api/index.html">API Test Report</a></li>
            </ul>
          </body>
          </html>
          HTML

          PREV_HISTORY_FILE="/tmp/previous-history.json"
          echo "[]" > "$PREV_HISTORY_FILE"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            if git show origin/gh-pages:history.json > "$PREV_HISTORY_FILE" 2>/dev/null; then
              true
            fi
          fi

          node -e "const fs=require('fs'); const prevPath=process.argv[1]; const reportPath='playwright-report/history.json'; let previous=[]; try{ const raw=fs.readFileSync(prevPath,'utf8'); const parsed=JSON.parse(raw); if(Array.isArray(parsed)) previous=parsed; }catch{} let counts={}; try{ const files=fs.existsSync('playwright-report-ui/data')?fs.readdirSync('playwright-report-ui/data').filter(f=>f.endsWith('.json')):[]; for(const f of files){ const p='playwright-report-ui/data/'+f; const o=JSON.parse(fs.readFileSync(p,'utf8')); if(o && o.stats){ counts=o.stats; break; } } }catch{} const entry={ timestamp:new Date().toISOString(), runUrl:process.env.RUN_URL, commitSha:process.env.COMMIT_SHA, ref:process.env.REF_NAME, jobConclusion:process.env.JOB_CONCLUSION, counts:Object.keys(counts).length?counts:null }; previous.push(entry); fs.writeFileSync(reportPath, JSON.stringify(previous, null, 2));" "$PREV_HISTORY_FILE"

      - name: Upload Pages artifact
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security scan
        continue-on-error: false
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > audit.json
          AUDIT_EXIT=$?
          set -e

          node -e "const fs=require('fs'); let summary={high:0,critical:0,total:0}; try{ const obj=JSON.parse(fs.readFileSync('audit.json','utf8')); const v=(obj.metadata&&obj.metadata.vulnerabilities)||{}; summary.high=Number(v.high||0); summary.critical=Number(v.critical||0); summary.total=Number(v.total||0); }catch{} const text=['## Security Scan Summary','', '- High vulnerabilities: '+summary.high, '- Critical vulnerabilities: '+summary.critical, '- Total vulnerabilities: '+summary.total].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,text+'\n');"

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            exit "$AUDIT_EXIT"
          fi
